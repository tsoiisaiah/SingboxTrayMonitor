name: Automated Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build Cross-Platform Binary
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Runtime
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Windows Resource Compiler Toolkit
        run: |
          make build

      - name: Compile and Package Production Binary
        run: |
          make build

      - name: Compress Executable into Zip Archive
        run: |
          Compress-Archive -Path SingboxTrayMonitor.exe -DestinationPath SingboxTrayMonitor-Windows-amd64.zip

      - name: Generate Github Release and Upload Assets Automatically
        uses: softprops/action-gh-release@v2
        with:
          files: SingboxTrayMonitor-Windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
